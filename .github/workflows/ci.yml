name: JavaScript CI

on:
  push:
    branches: [ main, master ]
    paths:
      - '**/*.js'
      - '**/*,js'
      - '.eslintrc.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/*.js'
      - '**/*,js'
      - '.eslintrc.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  validate:
    name: 🔍 Syntax and Lint Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Validate JavaScript syntax
        run: |
          set -euo pipefail
          files=$(find . -maxdepth 1 -type f \( -name '*.js' -o -name '*,js' \) | sort)
          if [ -z "$files" ]; then
            echo "❌ No JavaScript files found in repository root"
            exit 1
          fi

          echo "🔎 Running syntax check on all JavaScript files..."
          echo "$files" | while read -r file; do
            [ -n "$file" ] && node --check "$file"
          done
          echo "✅ All files passed syntax validation"

      - name: 🧹 Run ESLint
        run: |
          set -euo pipefail
          files=$(find . -maxdepth 1 -type f \( -name '*.js' -o -name '*,js' \) | sort)
          if [ -z "$files" ]; then
            echo "❌ No JavaScript files found in repository root"
            exit 1
          fi

          echo "🔎 Running ESLint on all JavaScript files..."
          npx eslint $files
          echo "✅ All files passed ESLint checks"
