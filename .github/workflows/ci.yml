name: JavaScript Code Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: 🔍 Syntax, Lint & Runtime Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Validate JavaScript syntax (all root .js files)
        run: |
          set -euo pipefail
          files=$(find . -maxdepth 1 -type f -name '*.js' | sort)
          if [ -z "$files" ]; then
            echo "❌ No root-level .js files found"
            exit 1
          fi

          echo "🔎 Running syntax check on all root-level .js files..."
          echo "$files" | while read -r file; do
            [ -n "$file" ] && node --check "$file"
          done
          echo "✅ All files passed syntax validation"

      - name: 🧹 Run ESLint on all root .js files
        run: |
          set -euo pipefail
          files=$(find . -maxdepth 1 -type f -name '*.js' | sort)
          if [ -z "$files" ]; then
            echo "❌ No root-level .js files found"
            exit 1
          fi

          echo "🔎 Running ESLint on all root-level .js files..."
          npx eslint $files
          echo "✅ All files passed ESLint checks"

      - name: 🏃 Run individual file execution test (dynamic)
        run: |
          set -euo pipefail
          echo "🔎 Testing root-level .js files for runtime errors..."

          # Files that are learning snippets or non-runnable in CI context.
          SKIP_FILES="file16.js file22.js file30.js file31.js"

          PASS=0
          FAIL=0
          SKIP=0

          for file in $(find . -maxdepth 1 -type f -name '*.js' | sort); do
            name=$(basename "$file")

            if echo " $SKIP_FILES " | grep -q " $name "; then
              echo "  ⏭ $name ... ⚪ SKIP (non-runnable learning example)"
              SKIP=$((SKIP + 1))
              continue
            fi

            echo -n "  ▶ $name ... "
            if node "$file" > /dev/null 2>&1; then
                echo "✅ PASS"
                PASS=$((PASS + 1))
            else
                echo "❌ FAIL"
                FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "📊 Results: $PASS passed, $FAIL failed, $SKIP skipped"
          if [ $FAIL -gt 0 ]; then
            echo "❌ Some files failed execution!"
            exit 1
          fi
          echo "✅ All runnable files executed successfully"
